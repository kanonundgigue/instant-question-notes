<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{記事タイトル}} | instant-question-notes</title>
    <meta name="description" content="{{記事の短い説明}}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&amp;family=Noto+Serif+JP:wght@500&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../styles/main.css">
  </head>
  <body>
    <main class="page">
      <article class="article">
        <a class="back-link" href="../../index.html">一覧に戻る</a>

        <h1>{{質問の主旨を表すタイトル}}</h1>
        <div class="article-meta">
          <p>作成日: <time datetime="{{YYYY-MM-DD}}">{{YYYY-MM-DD}}</time></p>
          <p>カテゴリ: {{category}}</p>
        </div>

        <section class="question-box" aria-labelledby="question-heading">
          <h2 id="question-heading">元の質問</h2>
          <p>{{元の質問文をそのまま残す}}</p>
        </section>

        <section aria-labelledby="answer-heading">
          <h2 id="answer-heading">回答</h2>
          <p>{{調査に基づく回答を書く}}</p>

          <p>コード例（言語名: {{言語名}}）:</p>
          <pre><code>{{コード例}}</code></pre>
        </section>

        <section class="references" aria-labelledby="references-heading">
          <h2 id="references-heading">参照</h2>
          <ul>
            <li><a href="https://example.com/">一次情報のタイトル</a></li>
          </ul>
        </section>
      </article>
    </main>
  </body>
</html>
