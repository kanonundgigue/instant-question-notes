<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>🔒 保護領域 | k-notes</title>
    <meta name="description" content="パスワードで保護された記事の入口。本文は解錠時のみ表示されます。">
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&amp;family=Noto+Serif+JP:wght@500&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../styles/main.css">
  </head>
  <body>
    <main class="page">
      <a class="back-link" href="../../index.html">一覧に戻る</a>

      <section class="category-summary" aria-labelledby="category-heading">
        <p class="site-kicker">Private</p>
        <h1 id="category-heading">🔒 保護領域</h1>
        <p>パスワードで保護された記事の入口です。記事を開いてパスワードを入力すると、本文がブラウザ内で復号されて表示されます。タイトルは公開されますが、本文は暗号化されています。</p>
      </section>

      <section class="section" aria-labelledby="notes-heading">
        <div class="section__header">
          <h2 id="notes-heading">記事一覧</h2>
          <p>新しい記事または最近更新した記事から順に表示します。</p>
        </div>

        <div class="note-grid">
          <article class="note-card">
            <p class="note-card__category">private <span class="note-card__lock">🔒</span></p>
            <h3><a href="sample-protected.html">サンプル: パスワード保護記事</a></h3>
            <p class="note-card__summary">仕組みの動作確認用サンプル。パスワードを入力すると本文が表示されます。</p>
            <p class="note-card__date">作成日: <time datetime="2026-06-13">2026-06-13</time></p>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
